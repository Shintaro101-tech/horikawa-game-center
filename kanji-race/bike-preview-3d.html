<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0020">
    <title>3D REAR VIEW GALLERY - KANJI レースバトル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            width: 100%; min-height: 100%; min-height: 100dvh;
            background: #0a0020;
            background-image:
                radial-gradient(ellipse at top, #4a0080 0%, transparent 60%),
                radial-gradient(ellipse at bottom, #001f4d 0%, transparent 60%),
                linear-gradient(180deg, #0a0020 0%, #000 100%);
            background-attachment: fixed; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
        }
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 30px 20px 60px; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .back {
            color: #18FFFF; text-decoration: none;
            border: 1px solid #18FFFF; padding: 6px 14px;
            border-radius: 999px; font-size: 13px; letter-spacing: 2px;
        }
        h1 {
            text-align: center; font-size: clamp(28px, 5vw, 46px);
            color: #18FFFF; text-shadow: 0 0 20px rgba(24, 255, 255, 0.4);
            letter-spacing: 6px; margin-bottom: 4px;
        }
        .sub { text-align: center; font-size: 13px; color: #FFEB3B; letter-spacing: 4px; margin-bottom: 32px; }
        .section-title {
            font-size: 22px; color: #FFEB3B; letter-spacing: 8px;
            text-align: center; margin: 50px 0 20px;
            padding: 10px;
            border-top: 1px solid rgba(24, 255, 255, 0.4);
            border-bottom: 1px solid rgba(24, 255, 255, 0.4);
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; }
        .card {
            background: rgba(20, 20, 40, 0.7);
            border: 2px solid #18FFFF;
            border-radius: 16px;
            padding: 22px 18px;
            text-align: center;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 32px rgba(24, 255, 255, 0.2);
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 50px rgba(24, 255, 255, 0.45); }
        .card.featured { border-color: #FFD700; box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); }
        .card.featured:hover { box-shadow: 0 0 60px rgba(255, 215, 0, 0.6); }
        .canvas-wrap {
            display: flex; justify-content: center;
            background: linear-gradient(180deg, #000 0%, #1a0040 80%, #4a0080 100%);
            border-radius: 12px; padding: 16px 0 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(24, 255, 255, 0.3);
            position: relative; overflow: hidden;
        }
        .canvas-wrap::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(ellipse at center 80%, rgba(0, 229, 255, 0.18) 0%, transparent 60%);
            pointer-events: none;
        }
        canvas { display: block; position: relative; z-index: 1; }
        .name { font-size: 20px; font-weight: 800; color: #FFEB3B; letter-spacing: 1px; }
        .tag { font-size: 11px; color: #18FFFF; letter-spacing: 3px; margin: 4px 0 12px; }
        .desc { font-size: 13px; color: #E0F7FA; line-height: 1.6; }
        .featured .name { color: #FFD700; font-size: 22px; }
    </style>
</head>
<body>
    <main>
        <div class="nav">
            <a href="./" class="back">← ゲームに もどる</a>
            <a href="./bike-preview.html" class="back">← トップビュー案</a>
        </div>
        <h1>3D REAR VIEW</h1>
        <div class="sub">◤ ライダー視点 ・ バイク と 車 ◢</div>

        <div class="section-title">🏍 BIKE 後方視点</div>
        <div class="grid" id="bike-grid"></div>

        <div class="section-title">🚗 CAR 後方視点</div>
        <div class="grid" id="car-grid"></div>
    </main>

    <div id="phaser-hidden" style="position:absolute; visibility:hidden; left:-9999px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
    const W = 280, H = 320;

    // === COLOR PALETTES (shared between bike & car) ===
    const cyber = {
        ug1: 0x00E5FF, ug2: 0xFF1744, plasma: 0x00FFFF, plasmaCore: 0xFFFFFF,
        bodyDark: 0x080814, bodyMid: 0x141420, bodySide: 0x040408,
        rim: 0xFFD700, hub: 0x18FFFF, hubCore: 0xFFFFFF,
        trim: 0x18FFFF, trimAcc: 0xFFD700,
        tail: 0xFF1744, tailIn: 0xFF80AB,
        suit: 0x14142a, stripe1: 0x18FFFF, stripe2: 0xFFD700, accent: 0xE91E63, spine: 0xFF1744,
        helmet: 0x080808, helmetHi: 0x1a1a2a, helmetSpine: 0xFFD700, helmetAcc: 0xFF1744,
        headlight: 0xFFEB3B, flame: 0xFF6F00
    };
    const stealth = { ...cyber,
        ug1: 0xFF1744, ug2: 0xFF1744, plasma: 0xFF1744, plasmaCore: 0xFF80AB,
        bodyDark: 0x050505, bodyMid: 0x0a0a0a, bodySide: 0x000,
        rim: 0xFF1744, hub: 0xFF1744, hubCore: 0xFFFFFF,
        trim: 0xFF1744, trimAcc: 0xFF1744,
        tail: 0xFF1744, tailIn: 0xFF80AB,
        suit: 0x0a0a0a, stripe1: 0xFF1744, stripe2: 0xFF1744, accent: 0xFF1744, spine: 0xFF1744,
        helmet: 0x000, helmetSpine: 0xFF1744, helmetAcc: 0xFF1744,
        headlight: 0xFF1744
    };
    const samurai = { ...cyber,
        ug1: 0xC62828, ug2: 0xFFD700, plasma: 0xFF6F00, plasmaCore: 0xFFEB3B,
        bodyDark: 0x14060a, bodyMid: 0x1a080e, bodySide: 0x080406,
        rim: 0xC62828, hub: 0xFFD700, hubCore: 0xC62828,
        trim: 0xFFD700, trimAcc: 0xFFD700,
        tail: 0xC62828, tailIn: 0xFF1744,
        suit: 0x14060a, stripe1: 0xC62828, stripe2: 0xFFD700, accent: 0xFFD700, spine: 0xFFD700,
        helmet: 0x14060a, helmetSpine: 0xFFD700, helmetAcc: 0xC62828,
        headlight: 0xFF1744
    };
    const motogp = { ...cyber,
        ug1: 0xC62828, ug2: 0xFFEB3B, plasma: 0xFF6F00, plasmaCore: 0xFFEB3B,
        bodyDark: 0xC62828, bodyMid: 0xE53935, bodySide: 0x8B0000,
        rim: 0xFFD700, hub: 0xFFFFFF, hubCore: 0x000,
        trim: 0xFFFFFF, trimAcc: 0xFFEB3B,
        tail: 0xFF1744, tailIn: 0xFF80AB,
        suit: 0xC62828, stripe1: 0xFFFFFF, stripe2: 0xFFEB3B, accent: 0x000, spine: 0xFFFFFF,
        helmet: 0xFFEB3B, helmetSpine: 0xC62828, helmetAcc: 0x000,
        headlight: 0xFFEB3B
    };
    const synth = { ...cyber,
        ug1: 0xE91E63, ug2: 0x18FFFF, plasma: 0xE91E63, plasmaCore: 0x18FFFF,
        bodyDark: 0x4A148C, bodyMid: 0x6A1B9A, bodySide: 0x2D0040,
        rim: 0xE91E63, hub: 0x18FFFF, hubCore: 0xFFFFFF,
        trim: 0xE91E63, trimAcc: 0x18FFFF,
        tail: 0xE91E63, tailIn: 0xFF80AB,
        suit: 0x4A148C, stripe1: 0x18FFFF, stripe2: 0xE91E63, accent: 0xFFFFFF, spine: 0xE91E63,
        helmet: 0x4A148C, helmetSpine: 0xE91E63, helmetAcc: 0x18FFFF,
        headlight: 0xFF80AB
    };
    const mecha = { ...cyber,
        ug1: 0xFF6F00, ug2: 0x4A5D2A, plasma: 0xFF6F00, plasmaCore: 0xFFEB3B,
        bodyDark: 0x4A5D2A, bodyMid: 0x6A7D4A, bodySide: 0x2A3D1A,
        rim: 0xFF6F00, hub: 0x424242, hubCore: 0xFF6F00,
        trim: 0xFF6F00, trimAcc: 0x000,
        tail: 0xFF6F00, tailIn: 0xFFEB3B,
        suit: 0x4A5D2A, stripe1: 0xFF6F00, stripe2: 0x000, accent: 0xFF1744, spine: 0xFF6F00,
        helmet: 0x2A3D1A, helmetSpine: 0xFF6F00, helmetAcc: 0xFF6F00,
        headlight: 0xFFEB3B
    };

    const bikeDesigns = [
        { id: 'b_samurai', name: 'B: サイバー侍', tag: 'CYBER SAMURAI', featured: true,
          desc: '兜（鍬形・前立て・吹返・錣・面頬）に、刀を背負う最強サムライバイク。',
          draw: (g, w, h) => drawBike(g, w, h, samurai, samuraiBikeExtras) },
        { id: 'b_cyber', name: '◎ 現在のスタイル', tag: 'CYBER CURRENT',
          desc: '今のシアン×ゴールドのレーシングカラー。', draw: (g, w, h) => drawBike(g, w, h, cyber) },
        { id: 'b_stealth', name: 'A: ステルス・ダークナイト', tag: 'STEALTH BLACK',
          desc: 'マットブラック+赤い細ライン。', draw: (g, w, h) => drawBike(g, w, h, stealth) },
        { id: 'b_motogp', name: 'C: ガチMotoGP', tag: 'PRO RACING',
          desc: '赤×白×蛍光イエロー。番号「7」、本物のサーキット感。',
          draw: (g, w, h) => drawBike(g, w, h, motogp) },
        { id: 'b_synth', name: 'E: シンセウェーブ80\'s', tag: 'SYNTHWAVE',
          desc: 'マゼンタ×シアン×ネオン紫。VAPORWAVE調。', draw: (g, w, h) => drawBike(g, w, h, synth) },
        { id: 'b_mecha', name: 'F: 重装コンバット', tag: 'COMBAT MECH',
          desc: '軍用グリーン×オレンジ警告ストライプ。', draw: (g, w, h) => drawBike(g, w, h, mecha) },
    ];

    const carDesigns = [
        { id: 'c_samurai', name: 'B: サイバー侍カー', tag: 'CYBER SAMURAI', featured: true,
          desc: 'トランクに刀、ルーフに前立て、トランクに鍬形フィン。漆黒×朱赤×金。',
          draw: (g, w, h) => drawCar(g, w, h, samurai, samuraiCarExtras) },
        { id: 'c_cyber', name: '◎ サイバーカー', tag: 'CYBER CURRENT',
          desc: 'シアン×ゴールド。スポーティな低重心ボディ。',
          draw: (g, w, h) => drawCar(g, w, h, cyber) },
        { id: 'c_stealth', name: 'A: ステルスカー', tag: 'STEALTH BLACK',
          desc: 'マットブラック+赤ライン。最低限のミニマル。',
          draw: (g, w, h) => drawCar(g, w, h, stealth) },
        { id: 'c_motogp', name: 'C: F1風レーサー', tag: 'PRO RACING',
          desc: '赤×白×イエローのレーシングカラー。',
          draw: (g, w, h) => drawCar(g, w, h, motogp) },
        { id: 'c_synth', name: 'E: シンセウェーブカー', tag: 'SYNTHWAVE',
          desc: 'マゼンタ×シアン×紫。バーチャルレーサー。',
          draw: (g, w, h) => drawCar(g, w, h, synth) },
        { id: 'c_mecha', name: 'F: 装甲車', tag: 'COMBAT MECH',
          desc: '軍用カラー、ゴツい装甲車。', draw: (g, w, h) => drawCar(g, w, h, mecha) },
    ];

    new Phaser.Game({
        type: Phaser.CANVAS, width: 1, height: 1,
        parent: 'phaser-hidden', transparent: true,
        scene: { create() {
            const all = bikeDesigns.concat(carDesigns);
            for (const d of all) {
                const g = this.make.graphics({ add: false });
                d.draw(g, W, H);
                g.generateTexture(d.id, W, H);
                g.destroy();
            }
            renderGrid('bike-grid', bikeDesigns, this);
            renderGrid('car-grid', carDesigns, this);
        }}
    });

    function renderGrid(elId, list, scene) {
        const grid = document.getElementById(elId);
        for (const d of list) {
            const card = document.createElement('div');
            card.className = 'card' + (d.featured ? ' featured' : '');
            const wrap = document.createElement('div');
            wrap.className = 'canvas-wrap';
            const c = document.createElement('canvas');
            c.width = W; c.height = H;
            c.getContext('2d').drawImage(scene.textures.get(d.id).getSourceImage(), 0, 0);
            wrap.appendChild(c);
            card.appendChild(wrap);
            card.insertAdjacentHTML('beforeend',
                `<div class="name">${d.name}</div><div class="tag">${d.tag}</div><div class="desc">${d.desc}</div>`);
            grid.appendChild(card);
        }
    }

    // ============================================================
    // === BIKE (proper rear view: rider's back is the focus) ===
    // ============================================================
    function drawBike(g, w, h, p, extras) {
        const cx = w / 2;

        // Ground shadow + underglow
        g.fillStyle(0x000, 0.55); g.fillEllipse(cx, h - 8, 220, 30);
        g.fillStyle(p.ug1, 0.30); g.fillEllipse(cx, h - 6, 240, 36);
        g.fillStyle(p.ug2, 0.18); g.fillEllipse(cx, h - 18, 180, 30);

        // Plasma engine glow
        g.fillStyle(p.plasma, 0.85); g.fillEllipse(cx - 50, h - 22, 32, 18); g.fillEllipse(cx + 50, h - 22, 32, 18);
        g.fillStyle(p.plasmaCore, 0.95); g.fillEllipse(cx - 50, h - 22, 18, 10); g.fillEllipse(cx + 50, h - 22, 18, 10);

        // === REAR WHEEL (proper rear view: flat tire from behind) ===
        // Tire wide squashed ellipse with curvature
        g.fillStyle(0x080808); g.fillEllipse(cx, h - 50, 150, 70);
        g.fillStyle(0x1a1a1a); g.fillEllipse(cx, h - 52, 142, 64);
        // Tire side darkening (sphere effect)
        g.fillStyle(0x000, 0.7); g.fillEllipse(cx - 60, h - 50, 28, 64); g.fillEllipse(cx + 60, h - 50, 28, 64);
        // Tread (vertical lines following curvature)
        g.lineStyle(1, 0x000);
        for (let i = -5; i <= 5; i++) {
            const x = cx + i * 13;
            const skew = Math.abs(i) * 0.6;
            g.lineBetween(x, h - 76 + skew, x, h - 22 - skew);
        }
        // Brake disc edge peeking
        g.lineStyle(1.2, 0xC0C0C0, 0.6);
        g.strokeEllipse(cx, h - 52, 156, 70);
        // Wheel rim (golden disc visible in middle)
        g.fillStyle(p.rim); g.fillEllipse(cx, h - 56, 80, 28);
        g.fillStyle(0x1a1a1a); g.fillEllipse(cx, h - 56, 70, 22);
        // Spokes
        g.lineStyle(2.5, p.rim, 0.95);
        for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            g.lineBetween(cx, h - 56, cx + Math.cos(a) * 35, h - 56 + Math.sin(a) * 11);
        }
        // Hub
        g.fillStyle(p.hub); g.fillCircle(cx, h - 56, 8);
        g.fillStyle(p.hubCore); g.fillCircle(cx, h - 56, 3.5);

        // === EXHAUST PIPES on sides (visible past wheel) ===
        g.fillStyle(0x37474F); g.fillRoundedRect(cx - 110, h - 95, 14, 60, 4);
        g.fillRoundedRect(cx + 96, h - 95, 14, 60, 4);
        g.fillStyle(p.trimAcc); g.fillRect(cx - 110, h - 95, 14, 5); g.fillRect(cx + 96, h - 95, 14, 5);
        g.fillStyle(0x000); g.fillEllipse(cx - 103, h - 38, 16, 8); g.fillEllipse(cx + 103, h - 38, 16, 8);
        g.fillStyle(p.flame); g.fillEllipse(cx - 103, h - 38, 11, 5); g.fillEllipse(cx + 103, h - 38, 11, 5);
        g.fillStyle(0xFFEB3B); g.fillEllipse(cx - 103, h - 38, 5, 2.5); g.fillEllipse(cx + 103, h - 38, 5, 2.5);
        g.fillStyle(p.flame, 0.5); g.fillCircle(cx - 103, h - 22, 8); g.fillCircle(cx + 103, h - 22, 8);

        // === REAR COWL/TAIL (above wheel, wraps around bike rear) ===
        g.fillStyle(p.bodyDark);
        g.beginPath();
        g.moveTo(cx - 95, h - 80); g.lineTo(cx + 95, h - 80);
        g.lineTo(cx + 70, h - 130); g.lineTo(cx - 70, h - 130);
        g.closePath(); g.fillPath();
        // Cowl side darkening
        g.fillStyle(p.bodySide);
        g.fillTriangle(cx - 95, h - 80, cx - 70, h - 130, cx - 80, h - 105);
        g.fillTriangle(cx + 95, h - 80, cx + 70, h - 130, cx + 80, h - 105);
        // Outline
        g.lineStyle(2, p.trim, 0.95);
        g.beginPath();
        g.moveTo(cx - 95, h - 80); g.lineTo(cx + 95, h - 80);
        g.lineTo(cx + 70, h - 130); g.lineTo(cx - 70, h - 130);
        g.closePath(); g.strokePath();

        // Tail light bar (long LED across)
        g.fillStyle(p.tail); g.fillRoundedRect(cx - 90, h - 100, 180, 11, 3);
        g.fillStyle(p.tailIn); g.fillRect(cx - 88, h - 97, 176, 5);
        g.fillStyle(0xFFFFFF); g.fillRect(cx - 80, h - 96, 160, 1.8);

        // Number plate
        g.fillStyle(p.trimAcc); g.fillRoundedRect(cx - 24, h - 88, 48, 16, 2);
        g.lineStyle(1, 0x000); g.strokeRoundedRect(cx - 24, h - 88, 48, 16, 2);
        g.fillStyle(0x000); g.fillRect(cx - 8, h - 84, 16, 2.5); g.fillRect(cx + 6, h - 84, 2.5, 12);

        // EXTRAS (e.g., katana on cowl)
        if (extras) extras(g, cx, h, p, 'cowl');

        // === RIDER'S BACK (BIG central element) ===
        // Wide trapezoid - shoulders wide at top, narrowing toward waist
        g.fillStyle(p.suit);
        g.beginPath();
        g.moveTo(cx - 75, h - 220); g.lineTo(cx + 75, h - 220);
        g.lineTo(cx + 60, h - 130); g.lineTo(cx - 60, h - 130);
        g.closePath(); g.fillPath();

        // Side body shading (3D feel)
        g.fillStyle(0x000, 0.3);
        g.fillTriangle(cx - 75, h - 220, cx - 60, h - 130, cx - 70, h - 175);
        g.fillTriangle(cx + 75, h - 220, cx + 60, h - 130, cx + 70, h - 175);

        // Spine (vertical accent)
        g.fillStyle(p.spine); g.fillRect(cx - 2, h - 220, 4, 90);

        // Racing stripes
        g.fillStyle(p.stripe1); g.fillRect(cx - 65, h - 175, 130, 5);
        g.fillStyle(p.stripe2); g.fillRect(cx - 65, h - 168, 130, 2);
        g.fillStyle(p.accent); g.fillRect(cx - 22, h - 162, 44, 9);

        // Number on back (big "7")
        g.fillStyle(0xFFFFFF, 0.85); g.fillRoundedRect(cx - 18, h - 155, 36, 22, 3);
        g.fillStyle(0x000); g.fillRect(cx - 12, h - 150, 24, 3.5); g.fillRect(cx + 8, h - 150, 3.5, 18);

        // Shoulder armor pieces (raised plates above shoulders)
        g.fillStyle(0x1a1a30);
        g.fillRoundedRect(cx - 86, h - 230, 26, 22, 6);
        g.fillRoundedRect(cx + 60, h - 230, 26, 22, 6);
        g.lineStyle(1.5, p.trimAcc);
        g.strokeRoundedRect(cx - 86, h - 230, 26, 22, 6);
        g.strokeRoundedRect(cx + 60, h - 230, 26, 22, 6);
        g.fillStyle(p.stripe1); g.fillRect(cx - 82, h - 220, 18, 2); g.fillRect(cx + 64, h - 220, 18, 2);

        // Arm hints (forearms going forward/down-out from shoulders)
        g.fillStyle(p.suit);
        g.fillTriangle(cx - 75, h - 220, cx - 95, h - 195, cx - 70, h - 200);
        g.fillTriangle(cx + 75, h - 220, cx + 95, h - 195, cx + 70, h - 200);

        // === HELMET (back-of-head dome) ===
        if (p.kabuto) {
            drawKabuto(g, cx, h);
        } else {
            drawBackHelmet(g, cx, h, p);
        }

        // === Front fairing tiny hint (peeking past helmet) ===
        g.fillStyle(p.bodyMid, 0.6);
        g.fillRect(cx - 22, h - 296, 44, 5);
        g.fillStyle(p.headlight, 0.7);
        g.fillRect(cx - 18, h - 295, 36, 2);

        // Mirror hints
        g.fillStyle(p.bodyMid);
        g.fillCircle(cx - 38, h - 290, 4); g.fillCircle(cx + 38, h - 290, 4);
        g.fillStyle(p.trim, 0.85);
        g.fillCircle(cx - 38, h - 290, 1.8); g.fillCircle(cx + 38, h - 290, 1.8);

        if (extras) extras(g, cx, h, p, 'post');
    }

    function drawBackHelmet(g, cx, h, p) {
        // Helmet bowl - back hemisphere
        g.fillStyle(p.helmet); g.fillEllipse(cx, h - 252, 70, 75);
        // Side highlight
        g.fillStyle(p.helmetHi || 0x1a1a2a, 0.7); g.fillEllipse(cx - 8, h - 268, 32, 25);
        // Outline
        g.lineStyle(1.5, 0x2a2a3a); g.strokeEllipse(cx, h - 252, 70, 75);
        // Vertical center spine (down the back of helmet)
        g.fillStyle(p.helmetSpine);
        g.fillRect(cx - 3, h - 286, 6, 60);
        g.fillTriangle(cx - 6, h - 286, cx + 6, h - 286, cx, h - 296);
        // Side accent triangles
        g.fillStyle(p.helmetAcc);
        g.fillTriangle(cx - 32, h - 252, cx - 22, h - 244, cx - 22, h - 260);
        g.fillTriangle(cx + 32, h - 252, cx + 22, h - 244, cx + 22, h - 260);
        // Bottom collar (cyan piping)
        g.lineStyle(1.5, p.trim, 0.9);
        g.strokeEllipse(cx, h - 220, 64, 18);
        // Logo bars
        g.fillStyle(p.trimAcc);
        g.fillRect(cx - 10, h - 246, 20, 1.5);
        g.fillRect(cx - 14, h - 240, 28, 1.5);
    }

    function drawKabuto(g, cx, h) {
        // === Helmet bowl (鉢) - dark crimson black, dome shape ===
        g.fillStyle(0x14060a); g.fillEllipse(cx, h - 252, 80, 78);
        g.fillStyle(0x281020, 0.85); g.fillEllipse(cx - 8, h - 268, 36, 26);
        g.fillStyle(0xC62828, 0.4); g.fillEllipse(cx - 10, h - 270, 16, 10);
        g.lineStyle(2, 0xFFD700); g.strokeEllipse(cx, h - 252, 80, 78);

        // Suji-bachi ridges (vertical ribs on bowl)
        g.lineStyle(1, 0xFFD700, 0.55);
        g.lineBetween(cx, h - 290, cx, h - 220);
        g.lineBetween(cx - 32, h - 252, cx - 6, h - 290);
        g.lineBetween(cx + 32, h - 252, cx + 6, h - 290);
        g.lineBetween(cx - 18, h - 244, cx - 4, h - 290);
        g.lineBetween(cx + 18, h - 244, cx + 4, h - 290);

        // === KUWAGATA (鍬形) - giant gold horns ===
        g.fillStyle(0xFFD700);
        g.beginPath();
        g.moveTo(cx - 30, h - 272); g.lineTo(cx - 52, h - 295);
        g.lineTo(cx - 60, h - 314); g.lineTo(cx - 48, h - 318);
        g.lineTo(cx - 40, h - 305); g.lineTo(cx - 28, h - 290);
        g.lineTo(cx - 18, h - 275); g.closePath(); g.fillPath();
        g.beginPath();
        g.moveTo(cx + 30, h - 272); g.lineTo(cx + 52, h - 295);
        g.lineTo(cx + 60, h - 314); g.lineTo(cx + 48, h - 318);
        g.lineTo(cx + 40, h - 305); g.lineTo(cx + 28, h - 290);
        g.lineTo(cx + 18, h - 275); g.closePath(); g.fillPath();
        // Horn outlines
        g.lineStyle(1.5, 0x8B4513);
        g.beginPath();
        g.moveTo(cx - 30, h - 272); g.lineTo(cx - 52, h - 295);
        g.lineTo(cx - 60, h - 314); g.lineTo(cx - 48, h - 318);
        g.lineTo(cx - 40, h - 305); g.lineTo(cx - 28, h - 290);
        g.lineTo(cx - 18, h - 275); g.closePath(); g.strokePath();
        g.beginPath();
        g.moveTo(cx + 30, h - 272); g.lineTo(cx + 52, h - 295);
        g.lineTo(cx + 60, h - 314); g.lineTo(cx + 48, h - 318);
        g.lineTo(cx + 40, h - 305); g.lineTo(cx + 28, h - 290);
        g.lineTo(cx + 18, h - 275); g.closePath(); g.strokePath();

        // === MAEDATE (前立て) - center sun crest ===
        g.fillStyle(0xFFD700); g.fillRect(cx - 3, h - 308, 6, 30);
        g.fillCircle(cx, h - 316, 8);
        g.fillStyle(0xC62828); g.fillCircle(cx, h - 316, 4);
        g.fillStyle(0xFFD700);
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            g.fillTriangle(
                cx + Math.cos(a) * 8, h - 316 + Math.sin(a) * 8,
                cx + Math.cos(a) * 14, h - 316 + Math.sin(a) * 14,
                cx + Math.cos(a + 0.3) * 9, h - 316 + Math.sin(a + 0.3) * 9
            );
        }

        // === FUKIGAESHI (吹返) - decorative side flares ===
        g.fillStyle(0x14060a);
        g.fillTriangle(cx - 36, h - 232, cx - 56, h - 224, cx - 50, h - 246);
        g.fillTriangle(cx + 36, h - 232, cx + 56, h - 224, cx + 50, h - 246);
        g.lineStyle(1.5, 0xFFD700);
        g.strokeTriangle(cx - 36, h - 232, cx - 56, h - 224, cx - 50, h - 246);
        g.strokeTriangle(cx + 36, h - 232, cx + 56, h - 224, cx + 50, h - 246);
        g.fillStyle(0xC62828);
        g.fillCircle(cx - 47, h - 233, 2.5); g.fillCircle(cx + 47, h - 233, 2.5);

        // === SHIKORO (錣) - layered neck guard plates ===
        for (let i = 0; i < 5; i++) {
            const py = h - 220 + i * 6;
            const pw = 76 - i * 5;
            g.fillStyle(0x14060a);
            g.fillRoundedRect(cx - pw/2, py, pw, 5, 1.5);
            g.lineStyle(0.8, 0xFFD700, 0.85);
            g.strokeRoundedRect(cx - pw/2, py, pw, 5, 1.5);
            g.fillStyle(0xC62828);
            for (let j = -2; j <= 2; j++) g.fillCircle(cx + j * (pw/5.5), py + 2.5, 0.9);
        }

        // === MEMPO (面頬) - face mask hint with red eye slit ===
        g.fillStyle(0x000); g.fillEllipse(cx, h - 240, 38, 7);
        g.fillStyle(0xFF1744); g.fillRect(cx - 14, h - 241, 28, 1.8);
    }

    function samuraiBikeExtras(g, cx, h, p, phase) {
        if (phase === 'cowl') {
            // === KATANA strapped horizontally on rear cowl ===
            g.fillStyle(0x1a1a1a); g.fillRect(cx - 90, h - 110, 180, 4);
            g.fillStyle(0x080808); g.fillRoundedRect(cx - 88, h - 118, 176, 8, 2);
            g.lineStyle(0.8, 0x222); g.strokeRoundedRect(cx - 88, h - 118, 176, 8, 2);
            g.fillStyle(0xFFD700);
            [-82, -52, -22, 8, 36, 64].forEach(dx => g.fillRect(cx + dx, h - 118, 2.5, 8));
            // Tsuba (guard)
            g.fillStyle(0xFFD700); g.fillCircle(cx + 78, h - 114, 7);
            g.fillStyle(0x1a1a1a); g.fillCircle(cx + 78, h - 114, 4);
            // Tsuka (handle wrapped in red)
            g.fillStyle(0xC62828); g.fillRoundedRect(cx + 84, h - 118, 24, 8, 2);
            g.fillStyle(0x000);
            for (let i = 0; i < 6; i++) {
                g.fillTriangle(cx + 86 + i * 4, h - 117, cx + 88 + i * 4, h - 114, cx + 86 + i * 4, h - 111);
            }
            // Pommel
            g.fillStyle(0xFFD700); g.fillCircle(cx + 110, h - 114, 4);
            g.fillStyle(0xC62828); g.fillCircle(cx + 110, h - 114, 1.8);
            // Sheath tip
            g.fillStyle(0xFFD700);
            g.fillTriangle(cx - 88, h - 118, cx - 88, h - 110, cx - 96, h - 114);
        }
        if (phase === 'post') {
            // Override default helmet by drawing kabuto (already handled via p.kabuto if set)
            // We'll set it via a flag below
        }
    }
    samurai.kabuto = true;
    samurai.drawKabuto = true;
    // Override flag check in drawBike
    Object.defineProperty(samurai, 'kabuto', { value: true });

    // ============================================================
    // === CAR (proper rear view) ===
    // ============================================================
    function drawCar(g, w, h, p, extras) {
        const cx = w / 2;

        // Ground shadow + underglow
        g.fillStyle(0x000, 0.55); g.fillEllipse(cx, h - 8, 260, 30);
        g.fillStyle(p.ug1, 0.30); g.fillEllipse(cx, h - 6, 270, 36);
        g.fillStyle(p.ug2, 0.18); g.fillEllipse(cx, h - 18, 220, 30);

        // Plasma engine glow (twin)
        g.fillStyle(p.plasma, 0.85); g.fillEllipse(cx - 60, h - 22, 32, 18); g.fillEllipse(cx + 60, h - 22, 32, 18);
        g.fillStyle(p.plasmaCore, 0.95); g.fillEllipse(cx - 60, h - 22, 18, 10); g.fillEllipse(cx + 60, h - 22, 18, 10);

        // === REAR WHEELS (visible at corners) ===
        // Left wheel
        g.fillStyle(0x080808); g.fillRoundedRect(cx - 130, h - 78, 36, 65, 6);
        g.fillStyle(0x1a1a1a); g.fillRoundedRect(cx - 128, h - 76, 32, 61, 5);
        g.lineStyle(1, 0x000);
        for (let i = 0; i < 7; i++) g.lineBetween(cx - 128, h - 73 + i * 9, cx - 96, h - 73 + i * 9);
        // Right wheel
        g.fillStyle(0x080808); g.fillRoundedRect(cx + 94, h - 78, 36, 65, 6);
        g.fillStyle(0x1a1a1a); g.fillRoundedRect(cx + 96, h - 76, 32, 61, 5);
        g.lineStyle(1, 0x000);
        for (let i = 0; i < 7; i++) g.lineBetween(cx + 96, h - 73 + i * 9, cx + 128, h - 73 + i * 9);
        // Rims
        g.fillStyle(p.rim); g.fillCircle(cx - 112, h - 45, 14); g.fillCircle(cx + 112, h - 45, 14);
        g.fillStyle(0x1a1a1a); g.fillCircle(cx - 112, h - 45, 9); g.fillCircle(cx + 112, h - 45, 9);
        g.lineStyle(1.5, p.rim);
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2;
            g.lineBetween(cx - 112, h - 45, cx - 112 + Math.cos(a) * 12, h - 45 + Math.sin(a) * 12);
            g.lineBetween(cx + 112, h - 45, cx + 112 + Math.cos(a) * 12, h - 45 + Math.sin(a) * 12);
        }
        g.fillStyle(p.hub); g.fillCircle(cx - 112, h - 45, 4); g.fillCircle(cx + 112, h - 45, 4);
        g.fillStyle(p.hubCore); g.fillCircle(cx - 112, h - 45, 1.5); g.fillCircle(cx + 112, h - 45, 1.5);

        // === REAR BUMPER + DIFFUSER ===
        g.fillStyle(p.bodyDark); g.fillRect(cx - 100, h - 60, 200, 35);
        g.fillStyle(p.bodyMid);
        for (let i = 0; i < 7; i++) g.fillRect(cx - 90 + i * 28, h - 50, 2.5, 30);
        g.lineStyle(2, p.trim, 0.95); g.strokeRect(cx - 100, h - 60, 200, 35);

        // === REAR PANEL / TRUNK (trapezoidal, rising up) ===
        g.fillStyle(p.bodyDark);
        g.beginPath();
        g.moveTo(cx - 110, h - 130); g.lineTo(cx + 110, h - 130);
        g.lineTo(cx + 100, h - 60); g.lineTo(cx - 100, h - 60);
        g.closePath(); g.fillPath();
        // Side darkening
        g.fillStyle(p.bodySide, 0.5);
        g.fillTriangle(cx - 110, h - 130, cx - 100, h - 60, cx - 105, h - 95);
        g.fillTriangle(cx + 110, h - 130, cx + 100, h - 60, cx + 105, h - 95);

        // === TAIL LIGHTS (long horizontal bars) ===
        g.fillStyle(p.tail); g.fillRoundedRect(cx - 100, h - 78, 90, 12, 3);
        g.fillRoundedRect(cx + 10, h - 78, 90, 12, 3);
        g.fillStyle(p.tailIn); g.fillRect(cx - 96, h - 75, 82, 5); g.fillRect(cx + 14, h - 75, 82, 5);
        g.fillStyle(0xFFFFFF); g.fillRect(cx - 90, h - 74, 70, 2); g.fillRect(cx + 20, h - 74, 70, 2);
        // Center brand strip
        g.fillStyle(p.tail); g.fillRoundedRect(cx - 8, h - 78, 16, 5, 1);

        // Trunk lines
        g.lineStyle(1, 0x252540, 0.7);
        g.lineBetween(cx, h - 130, cx, h - 60);
        g.lineBetween(cx - 80, h - 95, cx + 80, h - 95);

        // Brand badge (center)
        g.fillStyle(p.trimAcc); g.fillCircle(cx, h - 100, 9);
        g.lineStyle(1, 0x000); g.strokeCircle(cx, h - 100, 9);
        g.fillStyle(p.bodyDark);
        g.fillRect(cx - 5, h - 102, 10, 1.5); g.fillRect(cx - 5, h - 99, 10, 1.5);

        // EXTRAS pre-cabin (e.g., katana on trunk)
        if (extras) extras(g, cx, h, p, 'rear');

        // === SPOILER (rear wing) ===
        g.fillStyle(0x080808); g.fillRoundedRect(cx - 100, h - 138, 200, 8, 2);
        g.fillRect(cx - 95, h - 142, 6, 12); g.fillRect(cx + 89, h - 142, 6, 12);
        g.lineStyle(1, p.trim); g.strokeRoundedRect(cx - 100, h - 138, 200, 8, 2);

        // === BACK WINDOW (curved) ===
        g.fillStyle(0x002240);
        g.beginPath();
        g.moveTo(cx - 90, h - 195); g.lineTo(cx + 90, h - 195);
        g.lineTo(cx + 110, h - 138); g.lineTo(cx - 110, h - 138);
        g.closePath(); g.fillPath();
        // Window tint highlight
        g.fillStyle(p.trim, 0.3); g.fillRect(cx - 80, h - 188, 160, 8);
        // Frame
        g.lineStyle(2, p.trim, 0.85);
        g.beginPath();
        g.moveTo(cx - 90, h - 195); g.lineTo(cx + 90, h - 195);
        g.lineTo(cx + 110, h - 138); g.lineTo(cx - 110, h - 138);
        g.closePath(); g.strokePath();
        // Center divider
        g.lineStyle(1, p.trim, 0.4);
        g.lineBetween(cx, h - 195, cx, h - 138);

        // Driver visible through window (helmet + back of head)
        g.fillStyle(p.helmet); g.fillEllipse(cx, h - 178, 38, 26);
        g.fillStyle(p.helmetSpine); g.fillRect(cx - 2, h - 192, 4, 18);
        g.fillStyle(p.helmetAcc);
        g.fillTriangle(cx - 18, h - 178, cx - 12, h - 175, cx - 12, h - 181);
        g.fillTriangle(cx + 18, h - 178, cx + 12, h - 175, cx + 12, h - 181);

        // === ROOF ===
        g.fillStyle(p.bodyDark);
        g.beginPath();
        g.moveTo(cx - 80, h - 245); g.lineTo(cx + 80, h - 245);
        g.lineTo(cx + 90, h - 195); g.lineTo(cx - 90, h - 195);
        g.closePath(); g.fillPath();
        // Roof shine
        g.fillStyle(p.bodyMid); g.fillRect(cx - 60, h - 240, 120, 4);
        // Roof outline
        g.lineStyle(2, p.trim, 0.9);
        g.beginPath();
        g.moveTo(cx - 80, h - 245); g.lineTo(cx + 80, h - 245);
        g.lineTo(cx + 90, h - 195); g.lineTo(cx - 90, h - 195);
        g.closePath(); g.strokePath();
        // Center spine line
        g.fillStyle(p.spine); g.fillRect(cx - 1.5, h - 245, 3, 50);

        // === SIDE MIRRORS ===
        g.fillStyle(p.bodyDark);
        g.fillTriangle(cx - 90, h - 200, cx - 102, h - 188, cx - 92, h - 184);
        g.fillTriangle(cx + 90, h - 200, cx + 102, h - 188, cx + 92, h - 184);
        g.fillStyle(p.trim, 0.8); g.fillRect(cx - 100, h - 195, 5, 3); g.fillRect(cx + 95, h - 195, 5, 3);

        // === FRONT (small, far above roof) ===
        g.fillStyle(p.bodyMid, 0.6); g.fillRect(cx - 30, h - 270, 60, 8);
        g.fillStyle(p.headlight, 0.8); g.fillRect(cx - 26, h - 269, 52, 3);

        if (extras) extras(g, cx, h, p, 'post');
    }

    function samuraiCarExtras(g, cx, h, p, phase) {
        if (phase === 'rear') {
            // === KATANA mounted horizontally on trunk ===
            g.fillStyle(0x1a1a1a); g.fillRect(cx - 100, h - 105, 200, 4);
            g.fillStyle(0x080808); g.fillRoundedRect(cx - 98, h - 113, 196, 8, 2);
            g.lineStyle(0.8, 0x222); g.strokeRoundedRect(cx - 98, h - 113, 196, 8, 2);
            g.fillStyle(0xFFD700);
            [-92, -62, -32, 0, 28, 56, 84].forEach(dx => g.fillRect(cx + dx, h - 113, 2.5, 8));
            // Tsuba
            g.fillStyle(0xFFD700); g.fillCircle(cx + 88, h - 109, 7);
            g.fillStyle(0x1a1a1a); g.fillCircle(cx + 88, h - 109, 4);
            // Tsuka
            g.fillStyle(0xC62828); g.fillRoundedRect(cx + 94, h - 113, 24, 8, 2);
            g.fillStyle(0x000);
            for (let i = 0; i < 6; i++) {
                g.fillTriangle(cx + 96 + i * 4, h - 112, cx + 98 + i * 4, h - 109, cx + 96 + i * 4, h - 106);
            }
            // Pommel
            g.fillStyle(0xFFD700); g.fillCircle(cx + 120, h - 109, 4);
            g.fillStyle(0xC62828); g.fillCircle(cx + 120, h - 109, 1.8);
            // Sheath tip
            g.fillStyle(0xFFD700);
            g.fillTriangle(cx - 98, h - 113, cx - 98, h - 105, cx - 106, h - 109);
        }
        if (phase === 'post') {
            // === MAEDATE on roof (samurai car ornament) ===
            g.fillStyle(0xFFD700); g.fillRect(cx - 2.5, h - 278, 5, 32);
            g.fillCircle(cx, h - 285, 7);
            g.fillStyle(0xC62828); g.fillCircle(cx, h - 285, 3.5);
            g.fillStyle(0xFFD700);
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                g.fillTriangle(
                    cx + Math.cos(a) * 7, h - 285 + Math.sin(a) * 7,
                    cx + Math.cos(a) * 12, h - 285 + Math.sin(a) * 12,
                    cx + Math.cos(a + 0.3) * 8, h - 285 + Math.sin(a + 0.3) * 8
                );
            }
            // === KUWAGATA-style fins on trunk corners ===
            g.fillStyle(0xFFD700);
            g.beginPath();
            g.moveTo(cx - 95, h - 130); g.lineTo(cx - 110, h - 155);
            g.lineTo(cx - 118, h - 168); g.lineTo(cx - 110, h - 170);
            g.lineTo(cx - 102, h - 158); g.lineTo(cx - 92, h - 138);
            g.closePath(); g.fillPath();
            g.beginPath();
            g.moveTo(cx + 95, h - 130); g.lineTo(cx + 110, h - 155);
            g.lineTo(cx + 118, h - 168); g.lineTo(cx + 110, h - 170);
            g.lineTo(cx + 102, h - 158); g.lineTo(cx + 92, h - 138);
            g.closePath(); g.fillPath();
            g.lineStyle(1.2, 0x8B4513);
            g.beginPath();
            g.moveTo(cx - 95, h - 130); g.lineTo(cx - 110, h - 155);
            g.lineTo(cx - 118, h - 168); g.lineTo(cx - 110, h - 170);
            g.lineTo(cx - 102, h - 158); g.lineTo(cx - 92, h - 138);
            g.closePath(); g.strokePath();
            g.beginPath();
            g.moveTo(cx + 95, h - 130); g.lineTo(cx + 110, h - 155);
            g.lineTo(cx + 118, h - 168); g.lineTo(cx + 110, h - 170);
            g.lineTo(cx + 102, h - 158); g.lineTo(cx + 92, h - 138);
            g.closePath(); g.strokePath();
        }
    }
    </script>
