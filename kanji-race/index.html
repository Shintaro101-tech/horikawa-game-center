<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#050510">
    <title>Kanji侍Racing アルティメット</title>
    <style>
        :root {
            --n-blue: #00ffff; --n-pink: #ff00ff; --n-red: #ff3333;
            --n-green: #33ff33; --n-gold: #ffd700; --n-yellow: #ffff66;
        }
        body { margin: 0; padding: 0; overflow: hidden; background: #050510; color: #fff;
               font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", 'Segoe UI', sans-serif;
               user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
               overscroll-behavior: none; }
        #game-container, #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; }
        #game-container { z-index: 1; transition: filter 0.5s; touch-action: none; }
        #ui-layer { pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column;
                  align-items: center; justify-content: center; background: rgba(5,5,16,0.9);
                  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                  pointer-events: auto; transition: opacity 0.3s ease; padding: 20px; box-sizing: border-box;
                  overflow-y: auto; z-index: 50; }
        .hidden { opacity: 0; pointer-events: none !important; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); color: var(--n-blue);
             text-shadow: 0 0 10px var(--n-blue), 0 0 20px var(--n-blue); margin-bottom: 0.5rem; text-align: center; }
        h2 { font-size: 2rem; color: var(--n-gold); text-shadow: 0 0 10px var(--n-gold); margin-bottom: 5px; }
        .subtitle { font-size: clamp(1rem, 3vw, 1.2rem); color: #ccc; margin-bottom: 1.5rem; text-align: center; }
        .koban-display { position: absolute; top: 20px; left: 20px; font-size: 1.3rem; color: var(--n-gold);
                         font-weight: bold; text-shadow: 0 0 10px var(--n-gold); background: rgba(0,0,0,0.6);
                         padding: 5px 15px; border-radius: 20px; border: 1px solid var(--n-gold); pointer-events: auto;
                         z-index: 11; }
        .btn-container { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; align-items: center; }
        .btn-row { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; padding: 18px 16px; min-height: 60px;
               font-size: clamp(1.05rem, 3.8vw, 1.5rem); font-weight: bold;
               background: rgba(0,255,255,0.15); color: var(--n-blue); border: 2px solid var(--n-blue); border-radius: 10px;
               cursor: pointer; transition: background 0.08s ease, color 0.08s ease, transform 0.08s ease;
               text-shadow: 0 0 5px var(--n-blue);
               box-shadow: 0 0 10px rgba(0,255,255,0.2) inset; pointer-events: auto;
               font-family: inherit; touch-action: manipulation;
               -webkit-tap-highlight-color: rgba(0,255,255,0.3); }
        .btn:hover { background: rgba(0,255,255,0.3); color: #000; }
        .btn:active { background: var(--n-blue); color: #000;
                      box-shadow: 0 0 20px var(--n-blue) inset; transform: scale(0.97); }
        .btn-pink { color: var(--n-pink); border-color: var(--n-pink); background: rgba(255,0,255,0.1);
                    text-shadow: 0 0 5px var(--n-pink); box-shadow: 0 0 10px rgba(255,0,255,0.2) inset; }
        .btn-pink:hover, .btn-pink:active { background: var(--n-pink); color: #000;
                                            box-shadow: 0 0 20px var(--n-pink) inset; }
        .btn-gold { color: var(--n-gold); border-color: var(--n-gold); background: rgba(255,215,0,0.1);
                    text-shadow: 0 0 5px var(--n-gold); box-shadow: 0 0 10px rgba(255,215,0,0.2) inset; }
        .btn-gold:hover, .btn-gold:active { background: var(--n-gold); color: #000;
                                            box-shadow: 0 0 20px var(--n-gold) inset; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; transform: none !important;
                        box-shadow: none !important; background: transparent !important; color: #888 !important;
                        border-color: #888 !important; text-shadow: none !important; }
        .item-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 500px;
                     margin-bottom: 20px; max-height: 50vh; overflow-y: auto; padding-right: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center;
                     background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; border: 1px solid #555; }
        .shop-item.equipped { border-color: var(--n-blue); background: rgba(0,255,255,0.1);
                              box-shadow: 0 0 10px rgba(0,255,255,0.3); }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-size: 1.2rem; font-weight: bold; }
        .item-desc { font-size: 0.8rem; color: #aaa; }
        .item-price { color: var(--n-gold); font-weight: bold; }

        #hud { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
               pointer-events: none; z-index: 10; }
        #top-info { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column;
                    align-items: flex-end; gap: 5px; }
        .info-box { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 8px;
                    border: 1px solid var(--n-blue); font-size: 1.1rem; color: var(--n-blue);
                    font-weight: bold; text-shadow: 0 0 5px var(--n-blue); }
        #combo-box { color: var(--n-pink); border-color: var(--n-pink); text-shadow: 0 0 5px var(--n-pink);
                     transition: all 0.2s; opacity: 0; }
        #fever-overlay { position: absolute; top:0; left:0; width:100vw; height:100vh; height: 100dvh;
                         background: linear-gradient(45deg, rgba(255,0,255,0.2), rgba(0,255,255,0.2));
                         pointer-events: none; opacity: 0; z-index: 2; transition: opacity 0.5s; mix-blend-mode: screen; }

        #question-wrapper { position: absolute; top: 10%; width: 100%; display: flex; justify-content: center;
                            pointer-events: none; }
        #question-box { background: rgba(0,0,0,0.8); border: 2px solid var(--n-pink);
                        box-shadow: 0 0 15px var(--n-pink); border-radius: 12px;
                        padding: 15px 30px; min-height: 60px; display: flex; align-items: center;
                        justify-content: center; transition: opacity 0.3s; width: 90%; max-width: 800px; }
        #question-text { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: bold; color: #fff;
                         text-shadow: 2px 2px 4px #000; margin: 0; line-height: 1.8; text-align: center; }
        .blank { color: var(--n-pink); text-shadow: 0 0 10px var(--n-pink); }
        ruby { ruby-position: over; }
        rt { color: var(--n-yellow); font-size: clamp(0.8rem, 2.5vw, 1.2rem);
             text-shadow: 0 0 5px var(--n-yellow); }

        #popup-text { position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
                      font-size: clamp(2rem, 5vw, 4rem); font-weight: bold; pointer-events: none;
                      z-index: 20; opacity: 0; text-align: center; white-space: nowrap; }
        @keyframes popupAnim { 0%{transform:translate(-50%,50px);opacity:0;}
                               10%{transform:translate(-50%,0);opacity:1;}
                               80%{transform:translate(-50%,0);opacity:1;}
                               100%{transform:translate(-50%,-50px);opacity:0;} }
        #slash-effect { position: absolute; top: 50%; left: 50%; background: #fff;
                        transform: translate(-50%,-50%) rotate(-30deg) scaleX(0); transform-origin: center;
                        opacity: 0; z-index: 20; pointer-events: none; }
        .slashing { animation: slashAnim 0.3s cubic-bezier(0.1,0.8,0.1,1) forwards; }
        @keyframes slashAnim { 0%{transform:translate(-50%,-50%) rotate(-30deg) scaleX(0) scaleY(0.5);opacity:1;}
                               50%{transform:translate(-50%,-50%) rotate(-30deg) scaleX(1) scaleY(1);opacity:1;}
                               100%{transform:translate(-50%,-50%) rotate(-30deg) scaleX(1.2) scaleY(0);opacity:0;} }
        .shooting { animation: shootAnim 0.3s ease-out forwards; }
        @keyframes shootAnim { 0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
                               50%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}
                               100%{transform:translate(-50%,-50%) scale(3);opacity:0;} }

        .touch-area { position: absolute; bottom: 0; width: 50vw; height: 100vh; height: 100dvh;
                      pointer-events: auto; z-index: 5; }
        #touch-left { left: 0; } #touch-right { right: 0; }
        input[type="file"] { display: none; }
        .file-label { display: block; text-align: center; width: 100%; box-sizing: border-box; }
        .review-list { width: 100%; max-width: 600px; max-height: 40vh; overflow-y: auto;
                       background: rgba(0,0,0,0.5); border: 1px solid #555; padding: 10px; margin-bottom: 20px; }
        .review-item { padding: 5px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .home-back { position: absolute; top: 18px; right: 18px; z-index: 60;
                     color: #fff; text-decoration: none; background: rgba(0,0,0,0.6);
                     border: 1px solid var(--n-blue); padding: 6px 14px; border-radius: 999px;
                     font-size: 13px; letter-spacing: 2px; pointer-events: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="fever-overlay"></div>
    <div id="slash-effect"></div>
    <div id="popup-text" class="hidden"></div>

    <div id="ui-layer">
        <div class="koban-display" id="koban-ui">小判: 0</div>

        <!-- ホーム画面 -->
        <div id="home-screen" class="screen">
            <a href="../" class="home-back">🏠 アーケードへ</a>
            <h1>Kanji侍Racing<br><span style="font-size:0.5em; color:var(--n-pink);">アルティメット</span></h1>
            <div class="btn-container">
                <div class="btn-row">
                    <button class="btn" onclick="startGame('grade1')">1年生コース</button>
                    <button class="btn btn-pink" onclick="startGame('grade2')">2年生コース</button>
                </div>
                <button class="btn" style="color:var(--n-green); border-color:var(--n-green);" onclick="startGame('endless')">∞ エンドレスモード</button>
                <button class="btn btn-gold" onclick="showScreen('shop-screen')">🛒 ショップ・装備</button>
                <div class="btn-row">
                    <button class="btn" onclick="showScreen('review-screen')">📝 復習モード</button>
                    <label class="btn file-label">📁 問題追加 (CSV)<input type="file" id="csv-upload" accept=".csv"></label>
                </div>
            </div>
        </div>

        <!-- ショップ画面 -->
        <div id="shop-screen" class="screen hidden">
            <h2>万屋（よろずや）</h2>
            <div class="subtitle">集めた小判で強力な武器を解放せよ！</div>
            <div class="item-list" id="shop-list"></div>
            <button class="btn" style="width:200px;" onclick="showScreen('home-screen')">戻る</button>
        </div>

        <!-- 復習画面 -->
        <div id="review-screen" class="screen hidden">
            <h2>復習道場</h2>
            <div class="subtitle">間違えた漢字を復習しよう</div>
            <div class="review-list" id="review-list-ui">記録なし</div>
            <button class="btn btn-pink" id="btn-start-review" onclick="startGame('review')">復習コース開始</button>
            <button class="btn" style="margin-top:10px;" onclick="showScreen('home-screen')">戻る</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="top-info">
                <div class="info-box" id="progress-text">STAGE 0</div>
                <div class="info-box" id="combo-box">0 COMBO!</div>
                <div class="info-box" id="score-box" style="display:none; color:var(--n-green); border-color:var(--n-green);">SCORE: 0m</div>
            </div>
            <div id="question-wrapper"><div id="question-box" style="opacity: 0;"><div id="question-text"></div></div></div>
        </div>

        <div id="touch-left" class="touch-area hidden"></div>
        <div id="touch-right" class="touch-area hidden"></div>

        <div id="gameover-screen" class="screen hidden">
            <h1 style="color: var(--n-red);">無念...！</h1>
            <p id="gameover-reason" style="text-align: center; font-size:1.5rem;"></p>
            <button class="btn" onclick="showScreen('home-screen')">ホームへ戻る</button>
        </div>

        <div id="clear-screen" class="screen hidden">
            <h1 style="color: var(--n-green);">天晴（あっぱれ）！</h1>
            <p id="clear-msg" style="text-align: center; font-size:1.5rem;"></p>
            <button class="btn" onclick="showScreen('home-screen')">ホームへ戻る</button>
        </div>
    </div>

    <script>
        // ==========================================
        // データ・セーブ管理
        // ==========================================
        const WEAPON_DATA = {
            sword: { name: 'プラズマ刀', color: 0x00ffff, w: 200, h: 10, price: 0, desc: '標準的な刀' },
            greatsword: { name: '剛大剣', color: 0xff0000, w: 300, h: 40, price: 50, desc: '障害物を破壊できる（無傷）' },
            axe: { name: '重力斧', color: 0xffaa00, w: 250, h: 60, price: 100, desc: '障害物を破壊できる（無傷）' },
            spear: { name: '音速槍', color: 0x00ff00, w: 50, h: 50, price: 150, desc: '遠くから正解を突ける（遠距離判定）' },
            bow: { name: '光子弓', color: 0xff00ff, w: 60, h: 60, price: 200, desc: '遠くから正解を撃ち抜ける（遠距離判定）' }
        };

        let saveData = { koban: 0, unlockedWeapons: ['sword'], equippedWeapon: 'sword', highScore: 0, reviewList: [] };
        function loadSave() {
            const d = localStorage.getItem('kanjiSamuraiData');
            if(d) saveData = {...saveData, ...JSON.parse(d)};
            updateKobanUI();
        }
        function saveGame() { localStorage.setItem('kanjiSamuraiData', JSON.stringify(saveData)); updateKobanUI(); }
        function updateKobanUI() { document.getElementById('koban-ui').innerText = `小判: ${saveData.koban}`; }
        function addWrongKanji(q) {
            if(!saveData.reviewList.find(r => r.kanji === q.kanji)) { saveData.reviewList.push(q); saveGame(); }
        }

        const kanjiData = {
            grade1: [
                { kanji: '一', sentence: '〇ねんせいです。', yomi: 'いち', wrong: ['二', '十', '人'] },
                { kanji: '七', sentence: '〇じにおきる。', yomi: 'しち', wrong: ['十', '一', '八'] },
                { kanji: '下', sentence: 'つくえの〇。', yomi: 'した', wrong: ['上', '中', '右'] },
                { kanji: '三', sentence: '〇じのおやつ。', yomi: 'さん', wrong: ['二', '五', '王'] },
                { kanji: '人', sentence: '〇がおおい。', yomi: 'ひと', wrong: ['入', '大', '木'] },
                { kanji: '山', sentence: '〇にのぼる。', yomi: 'やま', wrong: ['川', '出', '田'] },
                { kanji: '川', sentence: '〇であそぶ。', yomi: 'かわ', wrong: ['山', '三', '水'] },
                { kanji: '手', sentence: '〇をあらう。', yomi: 'て', wrong: ['毛', '力', '才'] },
                { kanji: '月', sentence: '〇がまるい。', yomi: 'つき', wrong: ['目', '日', '円'] },
                { kanji: '花', sentence: '〇がさく。', yomi: 'はな', wrong: ['草', '竹', '木'] }
            ],
            grade2: [
                { kanji: '読', sentence: '本を〇む。', yomi: 'よ', wrong: ['語', '話', '書'] },
                { kanji: '雪', sentence: '〇がふる。', yomi: 'ゆき', wrong: ['雨', '雲', '雷'] },
                { kanji: '声', sentence: '大きな〇でよむ。', yomi: 'こえ', wrong: ['音', '歌', '耳'] },
                { kanji: '言', sentence: '先生が〇う。', yomi: 'い', wrong: ['話', '語', '読'] },
                { kanji: '南', sentence: '〇をむく。', yomi: 'みなみ', wrong: ['北', '東', '西'] },
                { kanji: '春', sentence: '〇がきた。', yomi: 'はる', wrong: ['夏', '秋', '冬'] },
                { kanji: '風', sentence: '〇がふく。', yomi: 'かぜ', wrong: ['雨', '雪', '空'] },
                { kanji: '晴', sentence: '〇れの天気。', yomi: 'は', wrong: ['雨', '曇', '雪'] },
                { kanji: '図', sentence: '〇をかく。', yomi: 'ず', wrong: ['絵', '書', '国'] },
                { kanji: '書', sentence: '名まえを〇く。', yomi: 'か', wrong: ['画', '図', '言'] }
            ],
            custom: []
        };
        const allKanjiStr = "春夏秋冬東西南北天地人日月火水木金土山川海空一二三四五六七八九十百千万人体目耳口手足";

        // CSV読み込み
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const lines = evt.target.result.split(/\r\n|\n/); kanjiData.custom = [];
                for(let i=1; i<lines.length; i++) {
                    if(!lines[i].trim()) continue;
                    const cols = lines[i].split(','); if(cols.length < 6) continue;
                    const k = cols[1], yomi = (cols[2]||'').split('、')[0] || (cols[3]||'').split('・')[0] || '', sen = cols[4];
                    if(!k || !sen) continue;
                    let wr = [];
                    while(wr.length<3) {
                        let d = allKanjiStr[Math.floor(Math.random()*allKanjiStr.length)];
                        if(d!==k && !wr.includes(d)) wr.push(d);
                    }
                    kanjiData.custom.push({ kanji: k, sentence: sen.replace(k, '〇'), yomi: yomi.replace(/[\(\)]/g,''), wrong: wr });
                }
                if(kanjiData.custom.length>0) {
                    alert(`${kanjiData.custom.length}問のカスタム問題を読み込みました！エンドレスモードなどで出題されます。`);
                }
            }; reader.readAsText(file);
        });

        // ==========================================
        // サウンド管理
        // ==========================================
        class SoundManager {
            constructor() { this.ctx = null; this.isInit = false; this.bgmTimer = null; }
            init() {
                if(!this.ctx){ this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
                if(this.ctx.state==='suspended') this.ctx.resume();
                this.isInit=true;
            }
            _o(f, ef, g, d, t, ty='sine') {
                const o = this.ctx.createOscillator(), gn = this.ctx.createGain();
                o.type=ty; o.frequency.setValueAtTime(f,t);
                o.frequency.exponentialRampToValueAtTime(Math.max(0.0001, ef),t+d);
                gn.gain.setValueAtTime(0,t);
                gn.gain.linearRampToValueAtTime(g,t+0.01);
                gn.gain.exponentialRampToValueAtTime(0.001,t+d);
                o.connect(gn); gn.connect(this.ctx.destination); o.start(t); o.stop(t+d);
            }
            _n(f, g, d, t) {
                const b=this.ctx.createBuffer(1,this.ctx.sampleRate*d,this.ctx.sampleRate), dt=b.getChannelData(0);
                for(let i=0;i<b.length;i++) dt[i]=Math.random()*2-1;
                const s=this.ctx.createBufferSource(); s.buffer=b;
                const fl=this.ctx.createBiquadFilter(); fl.type='highpass'; fl.frequency.value=f;
                const gn=this.ctx.createGain();
                gn.gain.setValueAtTime(g,t); gn.gain.exponentialRampToValueAtTime(0.01,t+d);
                s.connect(fl); fl.connect(gn); gn.connect(this.ctx.destination); s.start(t);
            }
            playSlash() {
                let t=this.ctx.currentTime;
                this._n(200, 2.5, 0.25, t);
                this._n(4000, 1.5, 0.1, t);
                this._o(250, 20, 1.5, 0.2, t, 'square');
                this._o(1500, 800, 0.8, 0.25, t, 'triangle');
            }
            playGreatsword() { let t=this.ctx.currentTime; this._n(800,1.5,0.4,t); this._o(150,40,0.8,0.6,t,'sawtooth'); }
            playAxe() { let t=this.ctx.currentTime; this._n(400,2,0.4,t); this._o(100,20,1,0.3,t,'square'); }
            playSpear() { let t=this.ctx.currentTime; this._n(5000,0.8,0.1,t); this._o(3000,2000,0.5,0.2,t); }
            playBow() { this._o(2000,300,0.5,0.3,this.ctx.currentTime,'triangle'); }
            playHit() { this._o(150,50,0.5,0.1,this.ctx.currentTime,'square'); }
            playCoin() { this._o(1200,1500,0.3,0.1,this.ctx.currentTime,'sine'); }
            playPowerUp() {
                let t=this.ctx.currentTime;
                [440, 660, 880].forEach((f, i) => this._o(f, f, 0.2, 0.4, t + i * 0.1, 'sine'));
            }
            playExplosion() { this._n(100,2.0,1.5,this.ctx.currentTime); }
            playClear() {
                let t=this.ctx.currentTime;
                [523,659,783,1046].forEach((f,i)=>this._o(f,f,0.2,1,t+i*0.1));
            }
            startBGM() {
                this.stopBGM();
                let next=this.ctx.currentTime, beat=0;
                const sch = () => {
                    if(!this.bgmTimer && beat>0) return;
                    while(next<this.ctx.currentTime+0.1){
                        if(beat%4===0) this._o(120,0.01,0.4,0.3,next);
                        if([1,0,0,1,0,0,1,0][beat%8]) this._o(55,55,0.1,0.2,next,'sawtooth');
                        next+=0.15; beat++;
                    }
                    this.bgmTimer=setTimeout(sch,25);
                };
                this.bgmTimer = setTimeout(sch, 0);
            }
            startBossBGM() {
                this.stopBGM();
                let next=this.ctx.currentTime, beat=0;
                const sch = () => {
                    if(!this.bgmTimer && beat>0) return;
                    while(next<this.ctx.currentTime+0.1){
                        if(beat%4===0||beat%4===2) this._o(80,0.01,0.6,0.3,next);
                        if(beat%2===0) this._o(40,40,0.3,0.2,next,'square');
                        if(beat%2!==0) this._n(8000, 0.2, 0.05, next);
                        if(beat===0) this._o(329.63, 329.63, 0.2, 0.4, next, 'triangle');
                        if(beat===4) this._o(392.00, 392.00, 0.2, 0.4, next, 'triangle');
                        if(beat===8) this._o(329.63, 329.63, 0.2, 0.4, next, 'triangle');
                        if(beat===12) this._o(311.13, 311.13, 0.2, 0.4, next, 'triangle');
                        next+=0.13; beat++;
                    }
                    this.bgmTimer=setTimeout(sch,25);
                };
                this.bgmTimer = setTimeout(sch, 0);
            }
            stopBGM() { if(this.bgmTimer){ clearTimeout(this.bgmTimer); this.bgmTimer=null; } }
        }
        const snd = new SoundManager();

        function equip(key) { saveData.equippedWeapon = key; saveGame(); renderShop(); applyWeapon(); }

        function startGame(mode) {
            snd.init(); snd.startBGM();

            let source = [];

            else if(mode==='grade2') source = kanjiData.grade2;
            else if(mode==='review') source = saveData.reviewList;
            else if(mode==='endless') source = [...kanjiData.grade1, ...kanjiData.grade2, ...kanjiData.custom];

        // ==========================================
        // スポーンロジック
        // ==========================================
        function spawnSection() {
            distCnt=0;
            if(isBossPhase) { spawnBossAttack(); return; }

            if(playMode!=='endless' && qIdx === currentQuestions.length-1 && currentQuestions.length>=10) {
                isBossPhase = true; bossHP = 1; bossMesh.visible = true; bossMesh.position.z = -250;
                if(isFever) { isFever = false; document.getElementById('fever-overlay').style.opacity=0; }
                bSpeed = 0.4;
                snd.playExplosion();
                snd.startBossBGM();
                document.getElementById('question-box').style.opacity='0';
                nextSpawn=60; return;
            }

            if(phase===0) {
                let numO = Math.floor(correctCnt/5) + (playMode==='endless'?Math.floor(runDist/500):0);
                for(let i=0;i<numO;i++) {
                    let m=new THREE.Mesh(new THREE.BoxGeometry(3,3,3),
                        new THREE.MeshStandardMaterial({color:0xff0000}));
                    m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),
                        new THREE.LineBasicMaterial({color:0xff0000})));
                    m.position.set((Math.random()-0.5)*30, 1.5, -100-i*10);
                    scene.add(m); objs.push({type:'obs', mesh:m, w:3, c:false});
                }
                if(Math.random() < (isFever?0.8:0.3)) {
                    let m=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,0.2,16),
                        new THREE.MeshStandardMaterial({color:0xffd700}));
                    m.rotation.x=Math.PI/2;
                    m.position.set((Math.random()-0.5)*30, 2, -120);
                    scene.add(m); objs.push({type:'koban', mesh:m, w:3, c:false});
                }
                phase=1; nextSpawn=50;
            } else if(phase===1) {
                let q = currentQuestions[qIdx % currentQuestions.length];
                let optsCount = 2;
                let opts = [q.kanji]; let wr = [...q.wrong];
                while(opts.length<optsCount) {
                    if(wr.length>0) opts.push(wr.shift());
                    else opts.push(allKanjiStr[Math.floor(Math.random()*allKanjiStr.length)]);
                }
                opts.sort(()=>0.5-Math.random());
                let lW = trackWidth/optsCount;
                opts.forEach((o,i)=>{
                    let c=document.createElement('canvas'); c.width=256; c.height=256; let ctx=c.getContext('2d');
                    ctx.fillStyle='rgba(0,20,40,0.8)'; ctx.fillRect(0,0,256,256);
                    ctx.strokeStyle='#0ff'; ctx.lineWidth=8; ctx.strokeRect(4,4,248,248);
                    ctx.fillStyle='#fff'; ctx.font='bold 120px sans-serif';
                    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(o,128,128);
                    let m=new THREE.Mesh(new THREE.PlaneGeometry(lW-0.5,12),
                        new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c), transparent:true, side:THREE.DoubleSide}));
                    m.position.set(-trackWidth/2+lW/2+i*lW, 4, -150);
                    scene.add(m);
                    objs.push({type:'gate', mesh:m, w:lW, isC:(o===q.kanji), c:false, tex:c});
                });
                document.getElementById('question-text').innerHTML =
                    q.sentence.replace('〇', `<ruby>〇<rt>${q.yomi}</rt></ruby>`);
                document.getElementById('question-box').style.opacity='1';
                phase=2; nextSpawn=150;
            } else {
                document.getElementById('question-box').style.opacity='0';
                phase=0; nextSpawn=30;
            }
        }

        function spawnBossAttack() {
            let q = currentQuestions[qIdx % currentQuestions.length];
            let opts = [q.kanji, ...q.wrong.slice(0,3)].sort(()=>0.5-Math.random());
            let lW = trackWidth/4;
            opts.forEach((o,i)=>{
                let group = new THREE.Group();
                let shurikenBody = new THREE.Mesh(new THREE.CylinderGeometry(4,4,0.5,4),

                shurikenBody.rotation.x = Math.PI/2;
                group.add(shurikenBody);

                let ctx=document.createElement('canvas').getContext('2d');
                ctx.canvas.width=256; ctx.canvas.height=256;
                ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(128,128,120,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff'; ctx.font='bold 140px sans-serif';
                ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.shadowColor = '#f00'; ctx.shadowBlur = 15; ctx.fillText(o,128,128);
                let p=new THREE.Mesh(new THREE.PlaneGeometry(6,6),
                    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(ctx.canvas), transparent:true}));
                p.position.z = 0.5; group.add(p);

                group.position.set(-trackWidth/2+lW/2+i*lW, 4, bossMesh.position.z + 10);
                scene.add(group);
                objs.push({type:'shuriken', mesh:group, body:shurikenBody, w:lW, isC:(o===q.kanji), c:false});

            document.getElementById('question-box').style.opacity='1';

            else if (saveData.equippedWeapon === 'greatsword') { snd.playGreatsword(); }
            else if (saveData.equippedWeapon === 'axe') { snd.playAxe(); }
            else if (saveData.equippedWeapon === 'spear') { snd.playSpear(); }
            else if (saveData.equippedWeapon === 'bow') { snd.playBow(); }

            isSlashing=true; slashProg=0; camShake=0.5;
            let el=document.getElementById('slash-effect');
            el.classList.remove('slashing','shooting'); void el.offsetWidth;
            let wd = WEAPON_DATA[saveData.equippedWeapon];
            el.style.boxShadow = `0 0 20px #${colorHex(wd.color)}`;

                el.style.borderRadius='50%';

                el.classList.add('slashing');

            }

        function createExp(pos, col, cnt=100) {
            let g=new THREE.BufferGeometry(),
                pa=new Float32Array(cnt*3), ca=new Float32Array(cnt*3), vl=[];
            let c=new THREE.Color(col);
            for(let i=0;i<cnt;i++){
                pa[i*3]=pos.x+(Math.random()-0.5)*2;
                pa[i*3+1]=pos.y+(Math.random()-0.5)*2;
                pa[i*3+2]=pos.z+(Math.random()-0.5)*2;
                vl.push(new THREE.Vector3((Math.random()-0.5)*3,(Math.random()-0.5)*3+1,(Math.random()-0.5)*3));
                ca[i*3]=c.r; ca[i*3+1]=c.g; ca[i*3+2]=c.b;
            }
            g.setAttribute('position', new THREE.BufferAttribute(pa,3));
            g.setAttribute('color', new THREE.BufferAttribute(ca,3));
            let s=new THREE.Points(g, new THREE.PointsMaterial({
                size:1.5, vertexColors:true, blending:THREE.AdditiveBlending, transparent:true}));
            scene.add(s); ptcls.push({sys:s, v:vl, life:1});
        }

        function checkHit() {
            let pL=pGrp.position.x-playerWidth/2, pR=pGrp.position.x+playerWidth/2;
            let wq = saveData.equippedWeapon;
            let hitZ = (wq==='spear'||wq==='bow') ? 40 : 2;

            objs.forEach(o => {
                if(o.c) return;
                let oL=o.mesh.position.x-o.w/2, oR=o.mesh.position.x+o.w/2;

                if(o.type==='obs' || o.type==='koban') {
                    if(o.mesh.position.z>-2 && o.mesh.position.z<2 && pR>oL && pL<oR) {
                        o.c=true;
                        if(o.type==='koban') {
                            snd.playCoin(); scene.remove(o.mesh);
                            saveData.koban++; updateKobanUI();
                            showPopup("小判ゲット！", 0xffd700);
                        } else if(o.type==='obs') {
                            if(isFever || wq==='greatsword' || wq==='axe') {
                                doSlash(); createExp(o.mesh.position, 0xff0000); scene.remove(o.mesh);
                            } else {
                                snd.playHit(); camShake=1; flash('rgba(255,0,0,0.5)');
                                pGrp.position.z=-3; o.mesh.position.y+=2; o.mesh.rotation.x+=1;
                                combo=0; updateHUD();
                            }
                        }
                    }
                }

                if((o.type==='gate' || o.type==='shuriken') && o.mesh.position.z >= -hitZ && o.mesh.position.z < 5) {
                    if(pR>oL+0.5 && pL<oR-0.5) {
                        objs.filter(x=>x.type===o.type && Math.abs(x.mesh.position.z-o.mesh.position.z)<10)
                            .forEach(x=>x.c=true);
                        if(o.isC) {
                            doSlash(); createExp(o.mesh.position, WEAPON_DATA[wq].color); scene.remove(o.mesh);
                            correctCnt++; combo++; updateHUD(); bSpeed+=0.02;
                            if(combo===5) triggerFever();

                            if(isBossPhase) {
                                bossHP--; snd.playExplosion();
                                createExp(bossMesh.position, 0xff0000, 300);
                                bossMesh.position.z -= 20;
                                if(bossHP<=0) {
                                    isPlaying=false;
                                    ['hud','touch-left','touch-right'].forEach(id => document.getElementById(id).classList.add('hidden'));
                                    setTimeout(()=>{snd.playClear(); showClear("大将討ち取ったり！");}, 1000);
                                    return;
                                } else {
                                    qIdx++;
                                    document.getElementById('question-box').style.opacity='0';
                                    distCnt=nextSpawn;
                                }
                            } else {
                                qIdx++;
                                document.getElementById('question-box').style.opacity='0';
                                if(playMode!=='endless' && qIdx >= currentQuestions.length && !isBossPhase) {
                                    isPlaying=false;
                                    ['hud','touch-left','touch-right'].forEach(id => document.getElementById(id).classList.add('hidden'));
                                    setTimeout(()=>{snd.playClear(); showClear("全問正解！");}, 500);
                                }
                            }
                        } else {
                            addWrongKanji(currentQuestions[qIdx % currentQuestions.length]);
                            isPlaying=false; snd.stopBGM(); snd.playExplosion();
                            createExp(pGrp.position, 0xff0000, 500);
                            pGrp.visible=false; camShake=2; flash('rgba(255,0,0,0.8)');
                            ['hud','touch-left','touch-right'].forEach(id => document.getElementById(id).classList.add('hidden'));
                            setTimeout(()=>{
                                showScreen('gameover-screen');
                                document.getElementById('gameover-reason').innerHTML =
                                    `正解は「<span style="color:var(--n-blue);">${currentQuestions[qIdx % currentQuestions.length].kanji}</span>」だ！`;
                            }, 1500);
                        }
                    }
                }
            });
        }

        function showPopup(t,c) {
            let e=document.getElementById('popup-text');
            e.innerText=t; e.style.color=`#${colorHex(c)}`;
            e.classList.remove('hidden');
            e.style.animation='none'; void e.offsetWidth;
            e.style.animation='popupAnim 1s forwards';
        }
        function flash(c) {
            let f=document.createElement('div');
            f.style.cssText=`position:absolute;top:0;left:0;width:100vw;height:100vh;background:${c};z-index:100;transition:opacity 0.3s; pointer-events:none;`;
            document.getElementById('ui-layer').appendChild(f);
            f.offsetHeight; f.style.opacity='0';
            setTimeout(()=>f.remove(),300);
        }
        function showClear(msg) {
            saveGame();
            ['hud','touch-left','touch-right'].forEach(id => document.getElementById(id).classList.add('hidden'));
            showScreen('clear-screen');
            document.getElementById('clear-msg').innerText=msg;
        }

        // ==========================================
        // 入力・ループ
        // ==========================================
        window.addEventListener('keydown', e=>{
            if(e.key==='ArrowLeft'||e.key==='a') keys.l=true;
            if(e.key==='ArrowRight'||e.key==='d') keys.r=true;
        });
        window.addEventListener('keyup', e=>{
            if(e.key==='ArrowLeft'||e.key==='a') keys.l=false;
            if(e.key==='ArrowRight'||e.key==='d') keys.r=false;
        });
        ['touch-left','touch-right'].forEach((id,i)=>{
            let el=document.getElementById(id), d=i===0?'l':'r';
            el.ontouchstart = el.onmousedown = (e)=>{ e.preventDefault(); keys[d]=true; };
            el.ontouchend = el.onmouseup = el.onmouseleave = (e)=>{ e.preventDefault(); keys[d]=false; };
        });

        function animate() {
            requestAnimationFrame(animate);
            if(isPlaying) {
                let s = bSpeed;
                if(pGrp.position.z<0){ pGrp.position.z+=0.2; s*=0.5; } else pGrp.position.z=0;
                if(isFever) {
                    feverTimer-=0.016;
                    if(feverTimer<=0){ isFever=false; bSpeed-=0.5;
                        document.getElementById('fever-overlay').style.opacity=0; }
                }

                runDist += s; gridH.position.z += s; if(gridH.position.z>4) gridH.position.z-=4;

                bGrp.position.y = Math.sin(Date.now() * 0.005) * 0.1;
                thrusters.forEach((t, i) => { t.rotation.x = Math.sin(Date.now() * 0.01 + i) * 0.1; });

                if(isSlashing) {
                    slashProg+=0.1;
                    armRPivot.rotation.x = Math.sin(slashProg*Math.PI)*2;
                    if(slashProg>=1){ isSlashing=false; armRPivot.rotation.x=0; }
                }

                if(isBossPhase && bossMesh.position.z < -80) { bossMesh.position.z += s*0.4; }

                for(let i = objs.length - 1; i >= 0; i--) {
                    const o = objs[i];
                    o.mesh.position.z += s;
                    if(o.type==='shuriken') o.body.rotation.z -= 0.2;
                    if(o.mesh.position.z>20){ scene.remove(o.mesh); objs.splice(i,1); }
                }

                checkHit();
                distCnt+=s; if(distCnt>nextSpawn) spawnSection();
                if(playMode==='endless' && Math.floor(runDist)%100===0) updateHUD();

                let ms = isFever ? 1.2 : 0.8;
                if(keys.l) targetX-=ms; if(keys.r) targetX+=ms;
                targetX = Math.max(-18, Math.min(18, targetX));
                pGrp.position.x += (targetX-pGrp.position.x)*0.15;
                bGrp.rotation.z = sGrp.rotation.z = (pGrp.position.x-targetX)*0.1;
                pGrp.rotation.y = (targetX-pGrp.position.x)*0.05;
            }
            if(camShake>0) {
                camera.position.x=(Math.random()-0.5)*camShake;
                camShake*=0.9;
                if(camShake<0.01) camera.position.x=0;
            }
            for(let i=ptcls.length-1; i>=0; i--) {
                let p=ptcls[i], pa=p.sys.geometry.attributes.position.array;
                for(let j=0; j<p.v.length; j++){
                    pa[j*3]+=p.v[j].x; pa[j*3+1]+=p.v[j].y; pa[j*3+2]+=p.v[j].z;
                    p.v[j].y-=0.05; p.v[j].x*=0.98; p.v[j].z*=0.98;
                }
                p.sys.geometry.attributes.position.needsUpdate=true;
                p.life-=0.02;
                p.sys.material.opacity=p.life;
                if(p.life<=0){ scene.remove(p.sys); ptcls.splice(i,1); }
            }
            renderer.render(scene, camera);
        }

        window.onload = () => { loadSave(); init3D(); };
    </script>
</body>
</html>
