<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#0a0020">
    <title>堀川家のゲームセンター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            min-height: 100dvh;
            overscroll-behavior: none;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
            color: #FFFFFF;
            background: #0a0020;
            background-image:
                radial-gradient(ellipse at top, #4a0080 0%, transparent 60%),
                radial-gradient(ellipse at bottom, #001f4d 0%, transparent 60%),
                linear-gradient(180deg, #0a0020 0%, #000000 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 20px 60px;
            text-align: center;
        }

        .header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(32px, 7vw, 52px);
            font-weight: 900;
            background: linear-gradient(180deg, #FFEB3B 0%, #FF6B00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: #18FFFF;
            letter-spacing: 4px;
            opacity: 0.85;
        }

        .ribbon {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 18px;
            font-size: 12px;
            color: #FFEB3B;
            border: 1px solid rgba(255, 235, 59, 0.5);
            border-radius: 999px;
            letter-spacing: 3px;
        }

        .games {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 36px;
        }

        @media (min-width: 640px) {
            .games {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        .game-card {
            display: block;
            position: relative;
            padding: 28px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: #FFFFFF;
            background: rgba(20, 20, 40, 0.7);
            border: 2px solid;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .game-card::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.15;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .game-card:active,
        .game-card:hover {
            transform: translateY(-4px);
        }

        .game-card:hover::before { opacity: 0.3; }

        .game-card.sea {
            border-color: #18FFFF;
            box-shadow: 0 0 30px rgba(24, 255, 255, 0.25);
        }
        .game-card.sea::before {
            background: linear-gradient(135deg, #001f4d 0%, #0099d6 100%);
        }
        .game-card.sea:hover { box-shadow: 0 0 50px rgba(24, 255, 255, 0.5); }

        .game-card.race {
            border-color: #E91E63;
            box-shadow: 0 0 30px rgba(233, 30, 99, 0.25);
        }
        .game-card.race::before {
            background: linear-gradient(135deg, #4a0080 0%, #E91E63 100%);
        }
        .game-card.race:hover { box-shadow: 0 0 50px rgba(233, 30, 99, 0.5); }

        .emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 12px currentColor);
        }

        .game-card h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .game-card .desc {
            font-size: 14px;
            color: #B0BEC5;
            margin-bottom: 12px;
        }

        .game-card .arrow {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 700;
            color: #FFEB3B;
            border: 1px solid rgba(255, 235, 59, 0.5);
            border-radius: 999px;
            letter-spacing: 2px;
        }

        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid #18FFFF;
            opacity: 0.5;
            z-index: 0;
        }
        .corner.tl { top: 16px; left: 16px; border-right: none; border-bottom: none; }
        .corner.tr { top: 16px; right: 16px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 16px; left: 16px; border-right: none; border-top: none; }
        .corner.br { bottom: 16px; right: 16px; border-left: none; border-top: none; }

        footer {
            margin-top: 48px;
            font-size: 12px;
            color: #607D8B;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <main>
        <div class="header">
            <h1>堀川家のゲームセンター</h1>
            <div class="subtitle">THE HORIKAWA FAMILY ARCADE</div>
            <div class="ribbon">◤ あそびたいゲームを えらんでね ◢</div>
        </div>
        <div class="games">
            <a href="deep-sea/" class="game-card sea">
                <div class="emoji">🛥</div>
                <h2>深海大冒険</h2>
                <p class="desc">うみ・りく・そら・うちゅう を ぼうけん！</p>
                <span class="arrow">▶ プレイ</span>
            </a>
            <a href="kanji-race/" class="game-card race">
                <div class="emoji">🏍</div>
                <h2>Kanjiレースバトル</h2>
                <p class="desc">かんじをえらんで バイクで レース！</p>
                <span class="arrow">▶ プレイ</span>
            </a>
        </div>
        <footer>© HORIKAWA FAMILY · MADE WITH VIBES</footer>
    </main>
</body>
</html>
